services:




  # ---- DATABASE ----
  # Custom Dockerfile: sets credentials, creates DB, seeds data
  # Service name 'db01' matches application.properties hostname
  db01:
    build:
       context: docker-files/db
       dockerfile: Dockerfile
    container_name: db01
    ports:
      - "3306:3306"
    volumes:
      - vprodbdata:/var/lib/mysql
    networks:
      - vpronet




  # ---- CACHE ----
  # No custom Dockerfile needed. Official image works as-is.
  # Service name 'mc01' matches application.properties hostname
  mc01:
    image: memcached:latest
    container_name: mc01
    ports:
      - "11211:11211"
    networks:
      - vpronet




  # ---- MESSAGE BROKER ----
  # No custom Dockerfile. Just set credentials via environment variables.
  # Service name 'rmq01' matches application.properties hostname
  # Credentials (test/test) also match application.properties
  # Reference: https://hub.docker.com/_/rabbitmq (Environment Variables section)
  rmq01:
    image: rabbitmq:latest
    container_name: rmq01
    ports:
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=test
      - RABBITMQ_DEFAULT_PASS=test
    networks:
      - vpronet




  # ---- APPLICATION SERVER ----
  # Custom Dockerfile: builds Java code, deploys WAR to Tomcat
  # Starts AFTER database, cache, and message broker are up
  app01:
    build:
      context: .
      dockerfile: docker-files/app/Dockerfile
    container_name: app01
    ports:
      - "8080:8080"
    depends_on:
      - db01
      - mc01
      - rmq01
    networks:
      - vpronet




  # ---- WEB SERVER / REVERSE PROXY ----
  # Custom Dockerfile: replaces default Nginx config with reverse proxy
  # Starts AFTER the app server is up
  web01:
    build:
       context: docker-files/web
       dockerfile: Dockerfile
    container_name: web01
    ports:
      - "80:80"
    depends_on:
      - app01
    networks:
      - vpronet




volumes:
  vprodbdata: {}




networks:
  vpronet: {}


